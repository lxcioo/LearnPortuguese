name: Deploy Content & Audio

on:
  push:
    branches: ["main"]
  # Erlaubt manuelles Starten des Workflows
  workflow_dispatch:

# WICHTIG: Berechtigungen für den GITHUB_TOKEN setzen
permissions:
  contents: read
  pages: write
  id-token: write

# Verhindert, dass mehrere Deploys gleichzeitig laufen
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # 1. Bauen (Audio generieren & Ordner vorbereiten)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # --- NEU: Caching für den Audio-Ordner ---
      - name: Cache Audio Files
        uses: actions/cache@v4
        with:
          path: assets/audio
          # Ein einzigartiger Key für diesen Lauf, damit am Ende immer neu gespeichert wird
          key: audio-cache-${{ github.run_id }}
          # Lädt den aktuellsten Cache aus vorherigen Läufen herunter
          restore-keys: |
            audio-cache-
      # -----------------------------------------

      - name: Generate Audio Files
        run: node scripts/generateAudio.js

      - name: Prepare Public Folder
        run: |
          mkdir -p public

          # Führt ein kurzes Node-Skript aus, um die JSON-Dateien zu vereinen
          node -e "
          const fs = require('fs');
          const path = require('path');
          const unitsDir = 'src/data/units';

          // Lese alle JSON Dateien im Ordner
          const files = fs.readdirSync(unitsDir).filter(f => f.endsWith('.json'));
          const units = [];

          for (const file of files) {
            units.push(JSON.parse(fs.readFileSync(path.join(unitsDir, file), 'utf8')));
          }

          // Baue das Haupt-Objekt
          const content = {
            courses: [
              {
                id: 'portuguese_a1',
                title: 'Portugiesisch A1',
                units: units
              }
            ]
          };

          // Speichere es als fertige content.json im public Ordner
          fs.writeFileSync('public/content.json', JSON.stringify(content));
          "

          # Kopiere die generierten Audio-Dateien
          if [ -d "assets/audio" ]; then cp -r assets/audio public/; fi

      # Der moderne Weg: Artefakt hochladen statt git push
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  # 2. Deployen (Veröffentlichen)
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4